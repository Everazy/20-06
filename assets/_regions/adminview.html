<main id="admin-view" class="app-shell p-5 lg:p-8 pb-40 hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-lg font-black text-slate-800 uppercase tracking-tight">Katalog Admin</h1>
            <button onclick="openProductModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[9px] font-black 
                    
                    uppercase shadow-lg shadow-indigo-100">Tambah +</button>
        </div>


        <!-- Statistik Dashboard -->
        <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 mb-5">
            <div class="admin-stat-card">
                <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em]">Total Produk</p>
                <h3 id="stat-total-products" class="text-xl font-black text-indigo-600 mt-1">0</h3>
            </div>
            <div class="admin-stat-card">
                <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em]">Promo</p>
                <h3 id="stat-total-promos" class="text-xl font-black text-rose-500 mt-1">0</h3>
            </div>
            <div class="admin-stat-card">
                <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.2em]">Terlaris</p>
                <h3 id="stat-total-best" class="text-xl font-black text-amber-500 mt-1">0</h3>
            </div>
        </div>

        <!-- Cari Produk Admin -->
        <div class="admin-search-box mb-5">
            <i class="fas fa-search text-indigo-500 text-xs"></i>
            <input id="admin-search-input" type="text" oninput="renderAdminProducts()" placeholder="Cari produk di dashboard...">
        </div>

        <!-- Filter Tab Admin -->
        <div class="flex gap-2 overflow-x-auto pb-4 -mx-2 px-2 no-scrollbar mb-4">
            <button onclick="filterAdmin('all')" class="tab-btn active px-4 py-2 rounded-full text-[8px] font-black uppercase border whitespace-nowrap" id="tab-all">Semua</button>
            <button onclick="filterAdmin('topup')" class="tab-btn px-4 py-2 rounded-full text-[8px] font-black uppercase border whitespace-nowrap bg-white text-slate-400" id="tab-topup">Game</button>
            <button onclick="filterAdmin('sosmed')" class="tab-btn px-4 py-2 rounded-full text-[8px] font-black uppercase border whitespace-nowrap bg-white text-slate-400" id="tab-sosmed">Sosmed</button>
            <button onclick="filterAdmin('premium')" class="tab-btn px-4 py-2 rounded-full text-[8px] font-black uppercase border whitespace-nowrap bg-white text-slate-400" id="tab-premium">Premium</button>
            <button onclick="filterAdmin('lainnya')" class="tab-btn px-4 py-2 rounded-full text-[8px] font-black uppercase border whitespace-nowrap bg-white text-slate-400" id="tab-lainnya">Lainnya</button>
        </div>

        <div id="admin-product-list" class="space-y-3"></div>
    </main>
